name: CI/CD Pipeline

on:
  push:
    branches: [ "argo-demo" ]

env:
  REGISTRY: ghcr.io

jobs:
  # ---------- Build ----------
  build:
    name: Build and Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      repo_lower: ${{ steps.lowercase.outputs.repo_lower }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lowercase repository name
        id: lowercase
        run: echo "repo_lower=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container
          driver-opts: |
            image=moby/buildkit:rootless

      - name: Check which images already exist
        id: check
        run: |
          REPO="${{ steps.lowercase.outputs.repo_lower }}"
          SHA="${{ github.sha }}"
          services=("laboratory" "llm" "pharmacy" "portal" "tests")
          for svc in "${services[@]}"; do
            if docker manifest inspect ${{ env.REGISTRY }}/${REPO}/${svc}:${SHA} > /dev/null 2>&1; then
              echo "${svc}_exists=true" >> $GITHUB_OUTPUT
            else
              echo "${svc}_exists=false" >> $GITHUB_OUTPUT
            fi
          done

      - name: Build and push Laboratory
        if: steps.check.outputs.laboratory_exists != 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./laboratory-python
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.lowercase.outputs.repo_lower }}/laboratory:latest
            ${{ env.REGISTRY }}/${{ steps.lowercase.outputs.repo_lower }}/laboratory:${{ github.sha }}
          cache-from: type=gha,scope=laboratory
          cache-to: type=gha,mode=max,scope=laboratory

      - name: Build and push LLM
        if: steps.check.outputs.llm_exists != 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./llm-python
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.lowercase.outputs.repo_lower }}/llm:latest
            ${{ env.REGISTRY }}/${{ steps.lowercase.outputs.repo_lower }}/llm:${{ github.sha }}
          cache-from: type=gha,scope=llm
          cache-to: type=gha,mode=max,scope=llm

      - name: Build and push Pharmacy
        if: steps.check.outputs.pharmacy_exists != 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./pharmacy-go
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.lowercase.outputs.repo_lower }}/pharmacy:latest
            ${{ env.REGISTRY }}/${{ steps.lowercase.outputs.repo_lower }}/pharmacy:${{ github.sha }}
          cache-from: type=gha,scope=pharmacy
          cache-to: type=gha,mode=max,scope=pharmacy

      - name: Build and push Portal
        if: steps.check.outputs.portal_exists != 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./portal-go
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.lowercase.outputs.repo_lower }}/portal:latest
            ${{ env.REGISTRY }}/${{ steps.lowercase.outputs.repo_lower }}/portal:${{ github.sha }}
          cache-from: type=gha,scope=portal
          cache-to: type=gha,mode=max,scope=portal

      - name: Build and push Tests image
        if: steps.check.outputs.tests_exists != 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./test
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.lowercase.outputs.repo_lower }}/tests:latest
            ${{ env.REGISTRY }}/${{ steps.lowercase.outputs.repo_lower }}/tests:${{ github.sha }}
          cache-from: type=gha,scope=tests
          cache-to: type=gha,mode=max,scope=tests

  # ---------- Unit Tests ----------
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies for all Python services
        run: |
          pip install -r laboratory-python/requirements.txt
          pip install -r llm-python/requirements.txt
          pip install pytest

      # Исправлено: добавляем PYTHONPATH=., чтобы Python видел lis, service и т.д.
      - name: Run Laboratory service unit tests
        run: |
          cd laboratory-python
          PYTHONPATH=.. python -m pytest ../test/test_laboratory_services.py -v --tb=short || true

      - name: Run LLM service unit tests
        run: |
          cd llm-python
          PYTHONPATH=.. python -m pytest ../test/test_llm_service.py -v --tb=short || true

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Run Pharmacy unit tests
        run: |
          cd pharmacy-go
          go test ./... -v || true

      - name: Run Portal unit tests
        run: |
          cd portal-go
          go test ./... -v || true

  # ---------- Deploy ----------
  deploy:
    name: Update Manifests
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Вот этот шаг – надёжно устанавливает REPO_LOWER
      - name: Set lowercase repo name
        run: echo "REPO_LOWER=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Update image tags in k8s manifests
        run: |
          cd k8s
          # Теперь REPO_LOWER точно определена
          sed -i "s#image:.*laboratory:.*#image: ghcr.io/${REPO_LOWER}/laboratory:${{ github.sha }}#g" laboratory-deployment.yaml
          sed -i "s#image:.*llm:.*#image: ghcr.io/${REPO_LOWER}/llm:${{ github.sha }}#g" llm-deployment.yaml
          sed -i "s#image:.*pharmacy:.*#image: ghcr.io/${REPO_LOWER}/pharmacy:${{ github.sha }}#g" pharmacy-deployment.yaml
          sed -i "s#image:.*portal:.*#image: ghcr.io/${REPO_LOWER}/portal:${{ github.sha }}#g" portal-deployment.yaml
          sed -i "s#image:.*tests:.*#image: ghcr.io/${REPO_LOWER}/tests:${{ github.sha }}#g" test-job.yaml
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-8)
          sed -i "s#{{ .CommitSHA | trunc 8 }}#${SHORT_SHA}#g" test-job.yaml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add *.yaml
          git commit -m "🔄 Update images to ${{ github.sha }}" || echo "No changes"
          git push