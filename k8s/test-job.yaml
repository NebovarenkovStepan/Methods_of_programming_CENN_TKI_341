apiVersion: batch/v1
kind: Job
metadata:
  name: hospital-tests-dcd6d5ee
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: test
          image: ghcr.io//tests:dcd6d5ee54d55acd45e9b52a945dfe9744fcc86e
          env:
            - name: PORTAL_URL
              value: http://portal:8080
            - name: PHARMACY_URL
              value: http://pharmacy:8081
            - name: LAB_URL
              value: http://laboratory:8000
            - name: LLM_URL
              value: http://llm:8000
            - name: DATABASE_URL
              value: postgresql://hospital:hospital_password@postgres:5432/hospital_db
          command: ["pytest"]
          args: ["/app/test/test_system_scenarios.py", "-v", "--tb=short"]