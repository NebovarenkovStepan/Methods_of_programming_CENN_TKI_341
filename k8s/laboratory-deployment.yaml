apiVersion: apps/v1
kind: Deployment
metadata:
  name: laboratory
spec:
  replicas: 1
  selector:
    matchLabels:
      app: laboratory
  template:
    metadata:
      labels:
        app: laboratory
    spec:
      containers:
        - name: laboratory
          image: ghcr.io/nebovarenkovstepan/methods_of_programming_cenn_tki_341/laboratory:9df2f6f23ba0a30e68d8cf92497e27dc49b5a472
          env:
            - name: DATABASE_URL
              value: postgresql://hospital:hospital_password@postgres:5432/hospital_db
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: INTEGRITY_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: integrity-secret
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 15