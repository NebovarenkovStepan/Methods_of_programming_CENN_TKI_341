apiVersion: apps/v1
kind: Deployment
metadata:
  name: pharmacy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pharmacy
  template:
    metadata:
      labels:
        app: pharmacy
    spec:
      containers:
        - name: pharmacy
          image: ghcr.io/nebovarenkovstepan/methods_of_programming_cenn_tki_341/pharmacy:48f00a586c3e4d2b7f61a79c3788e71b6e2c84f6
          env:
            - name: DATABASE_URL
              value: "postgres://hospital:hospital_password@postgres:5432/hospital_db?sslmode=disable"
            - name: PORT
              value: "8081"
          ports:
            - containerPort: 8081
          readinessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 60
            periodSeconds: 15